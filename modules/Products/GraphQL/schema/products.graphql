type Product {
    id: Int
    name: String
    slug: String
    quantity: Int
    price: Float
    old_price: Float
    discount: Int
    views_count: Int
    active: Boolean
    meta_title: String
    meta_description: String
    brand: Brand
    categories: [Category]
    values: [Value]
}

type Category {
    id: Int
    name: String
    slug: String
    image: String
    parent: Category
    children: [Category]
    active: Boolean
    will_be_soon: Boolean
}

type Brand {
    id: Int
    name: String
    slug: String
    link: String
    image: String
    active: Boolean
}

type BrandsWithLetters {
    letter: String
    brands: [Brand]
}

type BrandsData {
    letters: [String]
    data: [BrandsWithLetters]
}

type Value {
    id: Int
    name: String
    slug: String
    sort_order: Int
    active: Boolean
    characteristic: [Characteristic]
}

type Characteristic {
    id: Int
    name: String
    slug: String
    sort_order: Int
    active: Boolean
    show_in_filter: Boolean
    show_in_product: Boolean
}

input BrandInput {
    slug: String
}

input BrandsInput {
    search: String
}

input ProductInput {
    slug: String
}

extend type Query {
    brand(input: BrandInput @spread): Brand @field(resolver: "Modules\\Products\\GraphQL\\Queries\\Brand")
    brands: BrandsData @field(resolver: "Modules\\Products\\GraphQL\\Queries\\Brands")
    product(input: ProductInput @spread): Product @field(resolver: "Modules\\Products\\GraphQL\\Queries\\Product")
}
